version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: bookstore_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: bookstore
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    container_name: bookstore_backend
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=db;Port=5432;Database=bookstore;Username=postgres;Password=password
      - DB_CONNECTION_STRING=postgresql://postgres:password@db:5432/bookstore # For OmniSeed override
      - OmniSeed__PythonExecutable=/opt/venv/bin/python
      - OmniSeed__ScriptPath=/app/Seed-Cli/omniseed/bookstore_cli.py
    volumes:
      - ../Seed-Cli:/app/Seed-Cli
    depends_on:
      - db
    restart: unless-stopped

  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
    container_name: bookstore_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
